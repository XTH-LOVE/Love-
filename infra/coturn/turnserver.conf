# Replace the values marked with CHANGE_ME before starting coturn.
listening-port=3478
tls-listening-port=5349
fingerprint
lt-cred-mech
use-auth-secret
static-auth-secret=CHANGE_ME_TURN_SHARED_SECRET
realm=turn.love-home.example
server-name=turn.love-home.example
external-ip=CHANGE_ME_PUBLIC_IPV4
min-port=49160
max-port=49200
cert=/etc/coturn/certs/fullchain.pem
pkey=/etc/coturn/certs/privkey.pem
no-cli
no-tlsv1
no-tlsv1_1
stale-nonce=600
no-multicast-peers
no-loopback-peers
